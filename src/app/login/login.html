<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img src="images/logo.png" alt="I.S.F.D. y T. N° 70 Manuel Belgrano" class="logo-img" />
    </div>

    <!-- Heading -->
    <div class="login-heading">
      <h1>Acceder</h1>
      <p class="login-subtitle">Panel de administración del instituto</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <!-- Username field -->
      <div class="field-group">
        <label for="username" class="field-label">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
          </span>
          <input
            id="username"
            type="text"
            class="field-input"
            [class.field-input--error]="error()"
            placeholder="Ingresá tu usuario"
            [(ngModel)]="username"
            name="username"
            autocomplete="username"
            autofocus
          />
        </div>
      </div>

      <!-- Password field -->
      <div class="field-group">
        <label for="password" class="field-label">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="field-input field-input--password"
            [class.field-input--error]="error()"
            placeholder="Ingresá tu contraseña"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (!showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (error()) {
        <div class="error-banner" role="alert">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error() }}
        </div>
      }

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          Verificando…
        } @else {
          Ingresar
        }
      </button>
    </form>

    <!-- Footer note -->
    <p class="login-footer-note">I.S.F.D. y T. N° 70 &mdash; Solo acceso autorizado</p>
  </div>
</div>
