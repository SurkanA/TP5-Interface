<div class="login-page d-flex align-items-center justify-content-center min-vh-100 px-3 py-4">
  <div class="card login-card w-100 border p-4 p-sm-5 shadow-sm">
    <div class="login-logo d-flex justify-content-center mb-4">
      <img
        src="images/logo.png"
        alt="I.S.F.D. y T. N° 70 Manuel Belgrano"
        class="logo-img img-fluid"
        style="height: 56px; object-fit: contain"
      />
    </div>

    <div class="login-heading text-center mb-4">
      <h1 class="h3 fw-bold mb-1">Acceder</h1>
      <p class="text-muted small mb-0">Panel de administración del instituto</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate class="d-flex flex-column gap-3">
      <div class="field-group d-flex flex-column gap-1">
        <label
          for="username"
          class="form-label text-muted fw-bold text-uppercase small tracking-wider mb-1"
          >Usuario</label
        >
        <div class="input-group">
          <span class="input-group-text bg-light text-muted border-end-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
          </span>
          <input
            id="username"
            type="text"
            class="form-control"
            [class.is-invalid]="error()"
            placeholder="Ingresá tu usuario"
            [(ngModel)]="username"
            name="username"
            autocomplete="username"
            autofocus
          />
        </div>
      </div>

      <div class="field-group d-flex flex-column gap-1">
        <label
          for="password"
          class="form-label text-muted fw-bold text-uppercase small tracking-wider mb-1"
          >Contraseña</label
        >
        <div class="input-group">
          <span class="input-group-text bg-light text-muted border-end-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control border-end-0"
            [class.is-invalid]="error()"
            placeholder="Ingresá tu contraseña"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="btn btn-outline-secondary border-start-0 text-muted"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (!showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div
          class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 error-shake"
          role="alert"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="flex-shrink-0"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <div>{{ error() }}</div>
        </div>
      }

      <button
        type="submit"
        class="btn btn-primary w-100 fw-bold py-2 mt-2 d-flex align-items-center justify-content-center gap-2"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Verificando…
        } @else {
          Ingresar
        }
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0 opacity-75">
      I.S.F.D. y T. N° 70 &mdash; Solo acceso autorizado
    </p>
  </div>
</div>
