<section class="latest-news py-5">
  <div class="container">
    <h2 class="mb-4">Últimas noticias</h2>

    <div class="row g-4">

      @for (item of latestNews; track item.id) {
        <div class="col-12 col-sm-6 col-lg-4">
          <a [routerLink]="'/noticias/' + item.id" class="news-card d-block h-100 text-decoration-none">
            <img [src]="item.imageUrl" [alt]="item.title" class="news-card-img" />
            <div class="news-card-body p-3">
              @if (item.tags.length > 0) {
                <span class="badge news-tag mb-2">{{ item.tags[0] }}</span>
              }
              <h3 class="news-card-title h5 mb-0">{{ item.title }}</h3>
            </div>
          </a>
        </div>
      }

      <div class="col-12 col-sm-6 col-lg-4">
        <a routerLink="/noticias" class="news-card news-card--all d-flex flex-column align-items-center justify-content-center h-100 text-decoration-none">
          <i class="fa-solid fa-arrow-right-long news-card--all-icon mb-2"></i>
          <span class="news-card--all-text">Ver todas las noticias</span>
        </a>
      </div>

    </div>
  </div>
</section>
