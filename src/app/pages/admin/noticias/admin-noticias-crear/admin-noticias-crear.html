<div class="admin-news-create-page py-5">
  <div class="container">
    <div class="d-flex align-items-center gap-3 mb-5">
      <a
        routerLink="/admin/noticias"
        class="btn btn-outline-secondary btn-sm rounded-circle d-flex align-items-center justify-content-center"
        style="width: 38px; height: 38px"
      >
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div>
        <h1 class="display-6 fw-bold page-title m-0">Crear Nueva Noticia</h1>
        <p class="text-muted m-0">Publique una novedad en el portal de la institución</p>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm p-4 rounded-3">
          <div class="mb-4">
            <label for="news-title" class="form-label fw-semibold">Título de la Noticia</label>
            <input
              type="text"
              id="news-title"
              class="form-control form-control-lg border-2"
              placeholder="Ingrese el título..."
              [(ngModel)]="title"
              required
            />
          </div>

          <div class="mb-4">
            <label for="news-tags" class="form-label fw-semibold"
              >Etiquetas (separadas por coma)</label
            >
            <input
              type="text"
              id="news-tags"
              class="form-control border-2"
              placeholder="Ej: inscripciones, institucional, deportes..."
              [(ngModel)]="tagsString"
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Contenido</label>
            <div class="editor-wrapper border rounded-3 overflow-hidden">
              <div #editorContainer style="height: 350px"></div>
            </div>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <a routerLink="/admin/noticias" class="btn btn-outline-secondary px-4 py-2 fw-semibold"
              >Cancelar</a
            >
            <button
              class="btn btn-primary px-4 py-2 fw-semibold d-inline-flex align-items-center gap-2"
              (click)="onPublish()"
            >
              <i class="fa-solid fa-newspaper"></i> Publicar noticia
            </button>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm p-4 rounded-3 text-center h-100 d-flex flex-column">
          <label class="form-label fw-semibold text-start mb-3">Imagen de Portada</label>

          <div
            class="drag-drop-zone flex-grow-1 d-flex flex-column align-items-center justify-content-center border border-2 border-dashed rounded-3 p-4 position-relative"
            [class.drag-over]="isDragOver()"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            (click)="fileInput.click()"
            style="cursor: pointer; min-height: 250px"
          >
            <input
              type="file"
              #fileInput
              class="d-none"
              accept="image/*"
              (change)="onFileSelected($event)"
            />

            @if (imagePreview()) {
              <img
                [src]="imagePreview()"
                class="img-fluid w-100 h-100 object-fit-cover rounded-3 position-absolute top-0 start-0"
                alt="Vista previa de portada"
              />
              <div
                class="image-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center rounded-3 bg-dark bg-opacity-50 opacity-0 hover-opacity-100 transition-all"
              >
                <span class="text-white fw-bold"
                  ><i class="fa-solid fa-rotate me-1"></i> Cambiar imagen</span
                >
              </div>
            } @else {
              <div class="d-flex flex-column align-items-center text-muted">
                <i class="fa-solid fa-cloud-arrow-up fs-1 mb-3 text-primary"></i>
                <h5 class="h6 mb-1 text-dark fw-semibold">Arrastre una imagen aquí</h5>
                <p class="small mb-0">o haga clic para explorar archivos</p>
                <small class="text-muted mt-2">Formatos recomendados: JPG, PNG (máx. 2MB)</small>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
