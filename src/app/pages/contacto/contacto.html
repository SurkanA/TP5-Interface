<div class="page-wrapper">

  <div class="success-overlay" [class.active]="showSuccess">
    <div class="ripple ripple-1"></div>
    <div class="ripple ripple-2"></div>
    <div class="success-message">
      <i class="fa-solid fa-circle-check"></i>
      <span>¡Mensaje enviado!</span>
    </div>
  </div>

  <div class="form-card mx-auto px-4 px-sm-5 py-4">

    <div class="text-center mb-4 d-flex flex-column align-content-cente justify-content-center">
      <div class="d-flex justify-content-center">
        <i class="fa-regular fa-envelope header-icon d-block mb-2"></i>
      </div>
      <h1 class="fw-bold mb-1">Contactanos</h1>
      <p class="text-muted small mb-0">Completá el formulario y te respondemos a la brevedad.</p>
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="mb-3">
        <label for="nombre" class="form-label field-label">
          <i class="fa-solid fa-user me-1"></i>Nombre completo <span class="required">*</span>
        </label>
        <div class="input-wrapper" [class.shake]="shakingFields['nombre']">
          <input
            id="nombre"
            type="text"
            class="form-control"
            formControlName="nombre"
            placeholder="Ej: María García"
            [class.is-invalid-custom]="isInvalid('nombre')"
          />
        </div>
        <div class="error-message mt-1 ps-1" [class.visible]="isInvalid('nombre')">
          <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ getError('nombre') }}
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label field-label">
          <i class="fa-solid fa-at me-1"></i>E-Mail <span class="required">*</span>
        </label>
        <div class="input-wrapper" [class.shake]="shakingFields['email']">
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="Ej: maria@email.com"
            [class.is-invalid-custom]="isInvalid('email')"
          />
        </div>
        <div class="error-message mt-1 ps-1" [class.visible]="isInvalid('email')">
          <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ getError('email') }}
        </div>
      </div>

      <div class="mb-3">
        <label for="telefono" class="form-label field-label">
          <i class="fa-solid fa-phone me-1"></i>Telefono
          <span class="optional ms-1">(opcional)</span>
        </label>
        <div class="input-wrapper" [class.shake]="shakingFields['telefono']">
          <input
            id="telefono"
            type="tel"
            class="form-control"
            formControlName="telefono"
            placeholder="Ej: +54 9 11 1234-5678"
            [class.is-invalid-custom]="isInvalid('telefono')"
          />
        </div>
        <div class="error-message mt-1 ps-1" [class.visible]="isInvalid('telefono')">
          <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ getError('telefono') }}
        </div>
      </div>

      <div class="mb-3">
        <label for="asunto" class="form-label field-label">
          <i class="fa-solid fa-tag me-1"></i>Asunto <span class="required">*</span>
        </label>
        <div class="input-wrapper" [class.shake]="shakingFields['asunto']">
          <select
            id="asunto"
            class="form-select"
            formControlName="asunto"
            [class.is-invalid-custom]="isInvalid('asunto')"
          >
            <option value="" disabled selected>Seleccioná un asunto</option>
            <option value="consulta_general">Consulta general</option>
            <option value="anotarse_carreras">Anotarse a carreras</option>
            <option value="alumno_regular">Solicitud de Constancia de alumno regular</option>
            <option value="reclamo">Pedir mesas</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="error-message mt-1 ps-1" [class.visible]="isInvalid('asunto')">
          <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ getError('asunto') }}
        </div>
      </div>

      <div class="mb-4">
        <label for="mensaje" class="form-label field-label">
          <i class="fa-solid fa-message me-1"></i>Mensaje <span class="required">*</span>
        </label>
        <div class="input-wrapper" [class.shake]="shakingFields['mensaje']">
          <textarea
            id="mensaje"
            class="form-control"
            formControlName="mensaje"
            placeholder="Escribí tu consulta acá..."
            rows="4"
            [class.is-invalid-custom]="isInvalid('mensaje')"
          ></textarea>
        </div>
        <div class="error-message mt-1 ps-1" [class.visible]="isInvalid('mensaje')">
          <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ getError('mensaje') }}
        </div>
      </div>

      <button type="submit" class="btn submit-btn w-100 d-flex align-items-center justify-content-center gap-2" [disabled]="showSuccess">
        <span>Enviar mensaje</span>
        <i class="fa-solid fa-paper-plane"></i>
      </button>

    </form>
  </div>

</div>
