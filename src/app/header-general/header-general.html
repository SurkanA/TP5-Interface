<header
  class="header navbar navbar-expand-md sticky-top px-4 py-3 border-bottom justify-content-between align-items-center"
>
  <div
    class="logo-area navbar-brand d-flex align-items-center gap-2 m-0 cursor-pointer"
    style="cursor: pointer"
  >
    <img
      src="images/logo.png"
      alt="Logo del Instituto Superior de Formación Docente y Técnica N° 70 Manuel Belgrano"
      class="logo-img"
    />
  </div>
  <nav class="nav-links d-none d-md-flex gap-4 align-items-center">
    <a href="javascript:void(0)" class="nav-link fw-semibold px-0">Inicio</a>
    <a href="javascript:void(0)" class="nav-link fw-semibold px-0">Noticias</a>
    <a href="javascript:void(0)" class="nav-link fw-semibold px-0">Trayectoria</a>
    <a href="javascript:void(0)" class="nav-link fw-semibold px-0">Carreras</a>
  </nav>
  <div class="header-actions d-flex align-items-center gap-3">
    <button class="btn btn-outline-primary fw-semibold">Acceder</button>
    <button class="hamburger-btn btn border-0 p-2 d-md-none d-block" (click)="toggleMenu()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    </button>
  </div>
</header>

<div class="mobile-menu-overlay d-flex flex-column" [class.open]="menuOpen()">
  <div class="mobile-menu-header d-flex justify-content-between align-items-center mb-4">
    <div
      class="logo-area navbar-brand d-flex align-items-center gap-2 m-0 cursor-pointer"
      style="cursor: pointer"
    >
      <img
        src="images/logo.png"
        alt="I.S.F.D. y T. N 70 Logo"
        class="logo-img"
        style="height: 35px"
      />
    </div>
    <button class="close-btn btn border-0 p-2" (click)="toggleMenu()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" x2="6" y1="6" y2="18" />
        <line x1="6" x2="18" y1="6" y2="18" />
      </svg>
    </button>
  </div>
  <div class="mobile-menu-links d-flex flex-column gap-3">
    <a href="javascript:void(0)" class="nav-link fs-4 fw-semibold">Inicio</a>
    <a href="javascript:void(0)" class="nav-link fs-4 fw-semibold">Noticias</a>
    <a href="javascript:void(0)" class="nav-link fs-4 fw-semibold">Trayectoria</a>
    <a href="javascript:void(0)" class="nav-link fs-4 fw-semibold">Carreras</a>
    <hr class="my-3 text-secondary-50" />
    <button class="btn btn-primary w-100 fw-semibold py-2 mt-3">Iniciar Sesión</button>
  </div>
</div>
